server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: neeko-map
  
  # 数据库配置 (MySQL 9.x)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/neeko_map?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  
  # Redis配置 (可选)
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.neeko.map.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件上传路径 (Windows格式)
file:
  upload:
    path: F:/GIS_2026/code/neeko_map/uploads
    allowed-extensions: jpg,jpeg,png,gif,webp
    max-size: 10485760  # 10MB

# 日志配置
logging:
  level:
    com.neeko: debug
    org.springframework: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
